<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tienda Online</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f0f2f5; }

    header {
      background: linear-gradient(135deg, #000, #444);
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      letter-spacing: 1px;
    }

    .filtros { text-align: center; margin: 20px; }

    .filtros button {
      margin: 5px;
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      background: #ddd;
      cursor: pointer;
      transition: 0.3s;
    }

    .filtros button:hover {
      background: #28a745;
      color: white;
    }

    .container { display: flex; }

    .catalogo {
      width: 70%;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    .producto {
      background: white;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .producto:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .producto img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .producto h3 { margin: 5px 0; }

    .producto p {
      font-weight: bold;
      color: #28a745;
    }

    select {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
      border-radius: 8px;
    }

    .carrito {
      width: 30%;
      background: white;
      padding: 20px;
      border-left: 2px solid #ddd;
      box-shadow: -5px 0 10px rgba(0,0,0,0.05);
    }

    .carrito h2 { text-align: center; }

    .carrito ul {
      list-style: none;
      padding: 0;
    }

    .carrito li {
      margin-bottom: 10px;
      padding: 5px;
      border-bottom: 1px solid #eee;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      background: #28a745;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover { background: #218838; }

    .whatsapp {
      background: #25D366;
      margin-top: 10px;
    }

    .whatsapp:hover {
      background: #1ebe5d;
    }

  </style>
</head>
<body>

<header>
  🛍️ Mi Tienda
</header>

<div class="filtros">
  <button onclick="filtrar('todos')">Todos</button>
  <button onclick="filtrar('remeras')">Remeras</button>
  <button onclick="filtrar('chombas')">Chombas</button>
  <button onclick="filtrar('otros')">Otros</button>
</div>

<div class="container">

  <div class="catalogo" id="catalogo"></div>

  <div class="carrito">
    <h2>🛒 Carrito</h2>
    <ul id="listaCarrito"></ul>
    <p><strong>Total: $<span id="total">0</span></strong></p>
    <button class="whatsapp" onclick="enviarWhatsApp()">Comprar por WhatsApp</button>
  </div>

</div>

<script>
  const productos = [
    { id: 1, nombre: "Remera Básica", precio: 1000, categoria: "remeras", talles: ["S","M","L","XL"], imagen: "remera1.jpg" },
    { id: 2, nombre: "Remera Estampada", precio: 1200, categoria: "remeras", talles: ["S","M","L"], imagen: "remera2.jpg" },
    { id: 3, nombre: "Chomba Azul", precio: 1500, categoria: "chombas", talles: ["M","L","XL"], imagen: "chomba1.jpg" },
    { id: 4, nombre: "Chomba Roja", precio: 1600, categoria: "chombas", talles: ["S","M","L"], imagen: "chomba2.jpg" },
    { id: 5, nombre: "Gorra", precio: 800, categoria: "otros", talles: ["Único"], imagen: "gorra.jpg" }
  ];

  let carrito = [];

  const catalogo = document.getElementById("catalogo");
  const listaCarrito = document.getElementById("listaCarrito");
  const totalSpan = document.getElementById("total");

  function mostrarProductos(lista) {
    catalogo.innerHTML = "";
    lista.forEach(prod => {
      const div = document.createElement("div");
      div.classList.add("producto");
      div.innerHTML = `
        <img src="${prod.imagen}">
        <h3>${prod.nombre}</h3>
        <p>$${prod.precio}</p>
        <select id="talle-${prod.id}">
          ${prod.talles.map(t => `<option value="${t}">${t}</option>`).join('')}
        </select>
        <button onclick="agregarAlCarrito(${prod.id})">Agregar</button>
      `;
      catalogo.appendChild(div);
    });
  }

  function filtrar(categoria) {
    if (categoria === 'todos') {
      mostrarProductos(productos);
    } else {
      const filtrados = productos.filter(p => p.categoria === categoria);
      mostrarProductos(filtrados);
    }
  }

  function agregarAlCarrito(id) {
    const producto = productos.find(p => p.id === id);
    const talle = document.getElementById(`talle-${id}`).value;
    carrito.push({ ...producto, talle });
    actualizarCarrito();
  }

  function actualizarCarrito() {
    listaCarrito.innerHTML = "";
    let total = 0;

    carrito.forEach(item => {
      const li = document.createElement("li");
      li.textContent = `${item.nombre} (${item.talle}) - $${item.precio}`;
      listaCarrito.appendChild(li);
      total += item.precio;
    });

    totalSpan.textContent = total;
  }

  function enviarWhatsApp() {
    if (carrito.length === 0) {
      alert("El carrito está vacío");
      return;
    }

    let mensaje = "Hola, quiero comprar:\n";

    carrito.forEach(item => {
      mensaje += `- ${item.nombre} (${item.talle}) ($${item.precio})\n`;
    });

    mensaje += `\nTotal: $${totalSpan.textContent}`;

    const url = `https://wa.me/5493516168133?text=${encodeURIComponent(mensaje)}`;
    window.open(url, '_blank');
  }

  mostrarProductos(productos);
</script>

</body>
</html>
